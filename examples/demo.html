<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rediads Outstream Renderer Demo</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      body {
        margin: 0;
        background: #f3f5f9;
        color: #111827;
      }

      main {
        max-width: 920px;
        margin: 0 auto;
        padding: 32px 20px 64px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.75rem;
      }

      p {
        line-height: 1.6;
      }

      .article {
        background: #fff;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }

      .slot {
        margin: 24px 0;
      }

      code {
        background: #eef2ff;
        padding: 2px 6px;
        border-radius: 6px;
      }

      button.demo-btn {
        margin-top: 12px;
        padding: 10px 16px;
        border: 0;
        border-radius: 10px;
        background: #2563eb;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="article">
        <h1>Rediads Outstream Renderer</h1>
        <p>
          This demo renders a sample VAST tag through the Google IMA SDK using the
          <code>@rediads/renderer</code> package. In production, Prebid.js passes the winning
          bid's <code>vastUrl</code> or <code>vastXml</code> into the renderer.
        </p>

        <div id="video1" class="slot"></div>

        <button class="demo-btn" id="replay">Replay sample ad</button>
      </div>
    </main>

    <script type="module">
      import RediadsRenderer from '../src/index.ts';

      const SAMPLE_VAST_URL =
        'https://pubads.g.doubleclick.net/gampad/ads?iu=/21775744923/external/single_ad_samples&sz=640x480&cust_params=sample_ct%3Dlinear&ciu_szs=300x250%2C728x90&gdfp_req=1&output=vast&unviewed_position_start=1&env=vp&correlator=' +
        Date.now();

      function playDemo() {
        RediadsRenderer.renderOutstream(
          {
            adUnitCode: 'video1',
            adId: `demo-${Date.now()}`,
            vastUrl: SAMPLE_VAST_URL,
            width: 640,
            height: 360,
            mediaType: 'video',
          },
          document.getElementById('video1'),
          {
            adText: 'Advertisement',
            autoplay: 'viewable',
            muted: true,
            showControls: true,
            showCloseButton: true,
            onEvent: (event) => {
              console.log('[Rediads]', event.type, event);
            },
          }
        );
      }

      playDemo();
      document.getElementById('replay').addEventListener('click', playDemo);
    </script>
  </body>
</html>
